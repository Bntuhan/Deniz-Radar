<div class="home-kpi" style="margin-bottom: 24px;">
    <div class="stat-card" style="position: relative; overflow: hidden; background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);">
        <div style="position: absolute; top: 0; right: 0; padding: 16px; opacity: 0.1; font-size: 40px;">🛳️</div>
        <div class="stat-label">Yakındaki Gemiler</div>
        <div class="stat-value" style="display: flex; align-items: baseline; gap: 8px;">
            {nearby_count} <span style="font-size: 13px; color: #10b981; font-weight: 500;">menzilde</span>
        </div>
    </div>
    <div class="stat-card" style="position: relative; overflow: hidden; background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);">
        <div style="position: absolute; top: 0; right: 0; padding: 16px; opacity: 0.1; font-size: 40px;">📨</div>
        <div class="stat-label">Gelen Davetler</div>
        <div class="stat-value" style="display: flex; align-items: baseline; gap: 8px;">
            {invite_count} <span style="font-size: 13px; color: #f59e0b; font-weight: 500;">bekleyen</span>
        </div>
    </div>
</div>
<div class="stat-card" style="margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);">
    <div style="display: flex; align-items: center; gap: 12px;">
        <div style="width: 40px; height: 40px; border-radius: 12px; background: rgba(56, 189, 248, 0.1); display: flex; align-items: center; justify-content: center; font-size: 20px;">💬</div>
        <div>
            <div class="stat-label" style="margin-bottom: 2px;">Aktif Oda</div>
            <div style="font-size: 16px; font-weight: 600; color: #0f172a;">{active_room}</div>
        </div>
    </div>
    <div style="color: #64748b; font-size: 20px;">›</div>
</div>
