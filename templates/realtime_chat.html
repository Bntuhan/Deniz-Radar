<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  (function() {{
    var url = "{supabase_url}";
    var key = "{supabase_key}";
    var roomId = "{room_id}";
    var token = "{access_token}";
    if (!url || !key || !roomId || typeof supabase === "undefined") return;
    var client = supabase.createClient(url, key);
    if (token) client.realtime.setAuth(token);
    client.channel('chat-' + roomId)
      .on('postgres_changes', {{
        event: 'INSERT',
        schema: 'public',
        table: 'messages',
        filter: 'room_id=eq.' + roomId
      }}, function() {{
        if (window.parent && window.parent.location) window.parent.location.reload();
      }})
      .subscribe();
  }})();
</script>
