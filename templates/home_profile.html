<div class="card" style="margin-bottom: 24px; padding: 20px;">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
        <div style="font-weight: 600; color: #f8fafc; font-size: 15px;">Profil Bilgisi</div>
        <div style="font-size: 20px;">👤</div>
    </div>
    <div style="display: grid; grid-template-columns: 1fr; gap: 12px;">
        <div style="background: rgba(15,23,42,0.4); padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03);">
            <div style="font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; margin-bottom: 4px;">Kullanıcı Kimliği</div>
            <div style="font-size: 13px; color: #cbd5e1; font-family: monospace;">{user_id}</div>
        </div>
        <div style="background: rgba(15,23,42,0.4); padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div style="font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; margin-bottom: 4px;">Aktif Gemi</div>
                <div style="font-size: 14px; font-weight: 600; color: #f8fafc;">{active_ship}</div>
            </div>
            <div style="font-size: 20px;">🚢</div>
        </div>
    </div>
</div>
